name: forge_dance
description: Forge Dance Flutter app.
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.6
  dio: ^5.9.0
  easy_localization: ^3.0.7
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.2.1
  freezed_annotation: ^3.0.0
  go_router: ^16.2.4
  google_fonts: ^6.3.2
  hugeicons: ^0.0.11
  image_picker: ^1.2.0
  json_annotation: ^4.9.0
  lottie: ^3.3.2
  package_info_plus: ^9.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  pinput: ^5.0.2
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.13
  custom_lint: ^0.7.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/google_fonts/
    - assets/images/
    - assets/translations/
